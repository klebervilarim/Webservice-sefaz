services:
  - type: web
    name: sefaz-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CERT_PATH
        value: ./cert.pfx
      - key: CERT_PASSWORD
        sync: false
      - key: CNPJ
        value: "46040678000107"
      - key: AMBIENTE
        value: "1"
      - key: UF
        value: SP
      - key: WEBHOOK_URL
        value: https://finzora-insight-flow.lovable.app/api/public/webhooks/sefaz
      - key: WEBHOOK_SECRET
        sync: false
      - key: USER_ID
        sync: false
      - key: CRON
        value: "*/15 * * * *"
